<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Simple Form</h2>

    <!-- FORM -->
    <form th:action="@{/save}" th:object="${message}" method="post" class="card p-4 shadow">
        <!-- DATA DISPLAY -->
        <div class="mt-5 mb-5">
            <h4>Saved Data</h4>

            <ul class="list-group">
                <li class="list-group-item"
                    th:each="msg : ${messages}"
                    th:text="${msg.text}">
                </li>
            </ul>
        </div>
        <div class="mb-3">
            <label class="form-label">Enter Text</label>
            <input type="text" th:field="*{text}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>

    </form>



</div>

</body>
</html>
